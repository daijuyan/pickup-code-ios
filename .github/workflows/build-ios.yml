name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --clean

      - name: Detect workspace and scheme
        id: detect
        run: |
          cd ios
          WORKSPACE=$(ls *.xcworkspace 2>/dev/null | head -1)
          if [ -z "$WORKSPACE" ]; then
            XCPROJ=$(ls *.xcodeproj 2>/dev/null | head -1)
            SCHEME=$(xcodebuild -project "$XCPROJ" -list -json 2>/dev/null | python3 -c "
            import json,sys
            d=json.load(sys.stdin)
            schemes=d.get('project',{}).get('schemes',[])
            print(schemes[0] if schemes else 'app')
            " 2>/dev/null || echo "app")
            echo "use_workspace=false" >> $GITHUB_OUTPUT
            echo "project=$XCPROJ" >> $GITHUB_OUTPUT
            echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
            echo "Project: $XCPROJ, Scheme: $SCHEME"
          else
            SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list -json 2>/dev/null | python3 -c "
            import json,sys
            d=json.load(sys.stdin)
            schemes=d.get('workspace',{}).get('schemes',[])
            print(schemes[0] if schemes else 'app')
            " 2>/dev/null || echo "app")
            echo "use_workspace=true" >> $GITHUB_OUTPUT
            echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
            echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
            echo "Workspace: $WORKSPACE, Scheme: $SCHEME"
          fi

      - name: Build unsigned .app
        run: |
          if [ "${{ steps.detect.outputs.use_workspace }}" = "true" ]; then
            BUILD_FLAG="-workspace ios/${{ steps.detect.outputs.workspace }}"
          else
            BUILD_FLAG="-project ios/${{ steps.detect.outputs.project }}"
          fi
          xcodebuild \
            $BUILD_FLAG \
            -scheme "${{ steps.detect.outputs.scheme }}" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ENABLE_BITCODE=NO \
            DEVELOPMENT_TEAM=""

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r ios/build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r PickupCode-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PickupCode-unsigned
          path: PickupCode-unsigned.ipa
          retention-days: 30
