name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Debug native config
        run: |
          echo "=== AppDelegate ==="
          cat ios/app/AppDelegate.mm 2>/dev/null || cat ios/app/AppDelegate.m 2>/dev/null || cat ios/app/AppDelegate.swift 2>/dev/null || echo "NOT FOUND"
          echo ""
          echo "=== Podfile ==="
          cat ios/Podfile
          echo ""
          echo "=== iOS source files ==="
          find ios/app -type f | sort

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build unsigned .app
        run: |
          cd ios
          xcodebuild \
            -workspace app.xcworkspace \
            -scheme app \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Debug built app
        run: |
          echo "=== .app files ==="
          find ios/build/Build/Products/Release-iphoneos/*.app -type f | head -30
          echo ""
          echo "=== Frameworks ==="
          ls -la ios/build/Build/Products/Release-iphoneos/*.app/Frameworks/ 2>/dev/null || echo "No Frameworks"
          echo ""
          echo "=== main.jsbundle header ==="
          xxd ios/build/Build/Products/Release-iphoneos/*.app/main.jsbundle 2>/dev/null | head -3 || echo "NOT FOUND"

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r ios/build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r PickupCode-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PickupCode-unsigned
          path: PickupCode-unsigned.ipa
          retention-days: 30
