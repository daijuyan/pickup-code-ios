name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --clean

      - name: List ios directory
        run: ls -la ios/

      - name: Build unsigned .app
        run: |
          cd ios
          # Find workspace or project
          if ls -d *.xcworkspace 2>/dev/null; then
            WS=$(ls -d *.xcworkspace | head -1)
            echo "Using workspace: $WS"
            xcodebuild \
              -workspace "$WS" \
              -scheme "$(ls -d *.xcodeproj | head -1 | sed 's/.xcodeproj//')" \
              -configuration Release \
              -destination 'generic/platform=iOS' \
              -derivedDataPath build \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              DEVELOPMENT_TEAM=""
          else
            PROJ=$(ls -d *.xcodeproj | head -1)
            echo "Using project: $PROJ"
            xcodebuild \
              -project "$PROJ" \
              -scheme "$(echo $PROJ | sed 's/.xcodeproj//')" \
              -configuration Release \
              -destination 'generic/platform=iOS' \
              -derivedDataPath build \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              DEVELOPMENT_TEAM=""
          fi

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r ios/build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r PickupCode-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PickupCode-unsigned
          path: PickupCode-unsigned.ipa
          retention-days: 30
