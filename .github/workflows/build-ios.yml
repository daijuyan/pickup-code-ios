name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Debug: Print native config
        run: |
          echo "=== AppDelegate ==="
          cat ios/app/AppDelegate.mm || cat ios/app/AppDelegate.m || cat ios/app/AppDelegate.swift || echo "NOT FOUND"
          echo ""
          echo "=== Podfile ==="
          cat ios/Podfile
          echo ""
          echo "=== iOS project files ==="
          find ios/app -type f -name "*.mm" -o -name "*.m" -o -name "*.swift" -o -name "*.plist" | sort
          echo ""
          echo "=== Info.plist ==="
          cat ios/app/Info.plist
          echo ""
          echo "=== Build Settings (Hermes) ==="
          grep -r "hermes\|HERMES\|jsEngine\|USE_HERMES" ios/ --include="*.rb" --include="Podfile" --include="*.xcconfig" || echo "no hermes config found"

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build unsigned .app
        run: |
          cd ios
          xcodebuild \
            -workspace app.xcworkspace \
            -scheme app \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Debug: Check built .app
        run: |
          echo "=== .app contents ==="
          find ios/build/Build/Products/Release-iphoneos/*.app -type f | head -30
          echo ""
          echo "=== Frameworks ==="
          ls -la ios/build/Build/Products/Release-iphoneos/*.app/Frameworks/ 2>/dev/null || echo "No Frameworks dir"
          echo ""
          echo "=== main.jsbundle check ==="
          xxd ios/build/Build/Products/Release-iphoneos/*.app/main.jsbundle 2>/dev/null | head -3 || echo "main.jsbundle NOT FOUND"
          echo ""
          echo "=== Expo.plist ==="
          python3 -c "
          import plistlib
          with open('$(ls ios/build/Build/Products/Release-iphoneos/*.app/Expo.plist)', 'rb') as f:
              data = plistlib.load(f)
              for k, v in data.items():
                  print(f'{k}: {v}')
          " 2>/dev/null || echo "Expo.plist not found"

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r ios/build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r PickupCode-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PickupCode-unsigned
          path: PickupCode-unsigned.ipa
          retention-days: 30
