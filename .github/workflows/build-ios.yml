name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Patch Pods Swift settings
        run: |
          # Patch xcconfig files: set Swift version and disable strict concurrency
          find ios/Pods/Target\ Support\ Files -name "*.xcconfig" | while read f; do
            sed -i '' 's/SWIFT_VERSION = 5.0/SWIFT_VERSION = 6.0/g' "$f"
            grep -q "SWIFT_STRICT_CONCURRENCY" "$f" || echo "SWIFT_STRICT_CONCURRENCY = off" >> "$f"
          done
          # Also patch the pbxproj for any settings not in xcconfig
          ruby -e '
          require "xcodeproj"
          project = Xcodeproj::Project.open("ios/Pods/Pods.xcodeproj")
          project.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings["SWIFT_VERSION"] = "6.0"
              config.build_settings["SWIFT_STRICT_CONCURRENCY"] = "off"
              config.build_settings["OTHER_SWIFT_FLAGS"] = "$(inherited) -strict-concurrency=off"
            end
          end
          project.save
          '

      - name: Build unsigned .app
        run: |
          cd ios
          xcodebuild \
            -workspace app.xcworkspace \
            -scheme app \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r ios/build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r PickupCode-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PickupCode-unsigned
          path: PickupCode-unsigned.ipa
          retention-days: 30
